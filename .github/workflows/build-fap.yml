name: Build Flipper App

on:
  push:
    paths:
      - 'flipper-app/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ufbt
        run: pip install ufbt

      - name: Build FAP
        run: cd flipper-app && ufbt build
