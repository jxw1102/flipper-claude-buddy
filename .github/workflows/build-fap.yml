name: Build Flipper App

on:
  workflow_dispatch:
  push:
    paths:
      - 'flipper-app/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ufbt
        run: pip install ufbt

      - name: Build FAP
        run: cd flipper-app && ufbt build

      - name: Rename FAP with commit hash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          cp ~/.ufbt/build/claude_buddy.fap ~/.ufbt/build/claude_buddy-${SHORT_SHA}.fap

      - name: Upload FAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude_buddy-${{ github.sha }}
          path: ~/.ufbt/build/claude_buddy-*.fap
